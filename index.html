<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pebble Merge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08080c;
    --surface: #1c1c2b;
    --border: #3f3f5a;
    --text: #ffffff;
    --muted: #a0a0c0;
    --accent: #8e82ff;
    --danger: #ff4757;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    width:100%; height:100%;
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    overflow: hidden;
    user-select: none;
  }

  #app {
    display: flex;
    flex-direction: column;
    width: 100%; height: 100%;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
    background: var(--bg);
  }

  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    flex-shrink: 0;
    z-index: 10;
  }

  .hud-pill {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 6px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 90px;
  }
  .hud-pill .lbl {
    font-size: 0.7rem;
    font-weight: 800;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 2px;
  }
  .hud-pill .val {
    font-size: 1.5rem;
    font-weight: 900;
    color: #fff;
    line-height: 1;
  }

  #title-badge { font-size: 1.3rem; font-weight: 900; text-shadow: 0 0 15px rgba(142, 130, 255, 0.4); }
  #title-badge span { color: var(--accent); }

  #canvas-wrap { flex: 1; position: relative; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; }

  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    background: rgba(8, 8, 12, 0.9);
  }
  .overlay.show { opacity: 1; pointer-events: all; }

  .overlay-card {
    background: var(--surface);
    border: 2px solid var(--accent);
    border-radius: 32px;
    padding: 40px;
    text-align: center;
    width: 85%;
  }

  .btn-primary {
    background: var(--accent);
    border: none;
    border-radius: 18px;
    color: #fff;
    font-family: inherit;
    font-size: 1.2rem;
    font-weight: 900;
    padding: 16px 40px;
    cursor: pointer;
    width: 100%;
    margin-top: 20px;
  }

  #drag-hint {
    position: absolute;
    bottom: 30px; left: 50%;
    transform: translateX(-50%);
    font-size: 0.8rem;
    font-weight: 800;
    color: var(--accent);
    text-transform: uppercase;
    pointer-events: none;
    transition: opacity 0.3s;
    text-align: center;
  }

  #flash {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 5;
    opacity: 0; background: white;
    transition: opacity 0.05s;
  }
  #flash.pop { opacity: 0.2; }
</style>
</head>
<body>

<div id="app">
  <div id="hud">
    <div class="hud-pill"><span class="lbl">Score</span><span class="val" id="score-val">0</span></div>
    <div id="title-badge">Pebble<span>Merge</span></div>
    <div class="hud-pill"><span class="lbl">Shots</span><span class="val" id="shots-val">0</span></div>
  </div>

  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="flash"></div>
    <div id="drag-hint">Wait for pebbles to settle</div>

    <div class="overlay show" id="start-overlay">
      <div class="overlay-card">
        <h1 style="font-size:2.8rem; margin-bottom:10px;">Pebble Surge</h1>
        <button class="btn-primary" id="start-btn">Start Game</button>
      </div>
    </div>

    <div class="overlay" id="over-overlay">
      <div class="overlay-card">
        <h1 style="color:var(--danger); font-size:2.5rem">Game Over</h1>
        <div style="font-size: 1.8rem; font-weight: 900; margin: 20px 0;" id="final-display">0</div>
        <button class="btn-primary" id="retry-btn">Try Again</button>
      </div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvas-wrap');
const flash = document.getElementById('flash');
const hint = document.getElementById('drag-hint');

function resize() {
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
}
resize();
window.addEventListener('resize', resize);

const TIER_COLORS = [
  { h:'#4dabff', s:'#2160d4' }, // 1
  { h:'#2df5a3', s:'#1a9e69' }, // 2
  { h:'#ffec3d', s:'#b8a614' }, // 3
  { h:'#ff9233', s:'#c46512' }, // 4
  { h:'#ff3d71', s:'#b81440' }, // 5
  { h:'#a65cff', s:'#6e26cc' }, // 6
  { h:'#ff00ff', s:'#990099' }, // 7
  { h:'#ffffff', s:'#94a3b8' }  // 8+
];

// MECHANICS
const BASE_RADIUS = 28; 
const SCALE_FACTOR = 1.25; 
const GET_RADIUS = (tier) => Math.round(BASE_RADIUS * Math.pow(SCALE_FACTOR, tier - 1));
const LOSE_Y = () => Math.round(canvas.height * 0.78);
const LAUNCH_Y = () => Math.round(canvas.height * 0.88);

let pebbles = [], score = 0, shots = 0, merges = 0, gameActive = false, loseTimer = null;
let isDragging = false, dragSX = 0, dragSY = 0, dragCX = 0, dragCY = 0;
let currentTier = 1, nextTier = 1, mergePointsAccumulated = 0;

class Pebble {
  constructor(x, y, tier, vx = 0, vy = 0) {
    this.x = x; this.y = y; this.tier = tier;
    this.r = GET_RADIUS(tier);
    this.vx = vx; this.vy = vy;
    this.moving = true; this.settled = false; this.floating = false; this.dead = false;
  }
  get color() { return TIER_COLORS[Math.min(this.tier - 1, TIER_COLORS.length - 1)].h; }
  get shadow() { return TIER_COLORS[Math.min(this.tier - 1, TIER_COLORS.length - 1)].s; }

  draw(overrideX, overrideY) {
    if (this.dead) return;
    const px = overrideX ?? this.x;
    const py = overrideY ?? this.y;

    ctx.save();
    ctx.translate(px, py);
    ctx.shadowColor = this.color;
    ctx.shadowBlur = (this.settled || overrideX) ? 15 : 5;

    const gr = ctx.createRadialGradient(-this.r*0.3, -this.r*0.3, 0, 0, 0, this.r);
    gr.addColorStop(0, lightenHex(this.color, 60));
    gr.addColorStop(0.5, this.color);
    gr.addColorStop(1, this.shadow);
    
    ctx.beginPath(); ctx.arc(0, 0, this.r, 0, Math.PI*2);
    ctx.fillStyle = gr; ctx.fill();
    
    ctx.shadowBlur = 0;
    ctx.fillStyle = (this.tier === 3 || this.tier === 4) ? '#000' : '#fff';
    ctx.font = `900 ${Math.max(12, this.r * 0.7)}px Nunito`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(this.tier, 0, 0);
    ctx.restore();
  }

  update() {
    if (this.dead) return;
    if (this.floating) {
      this.y -= 5;
      if (this.y - this.r <= 0) { this.y = this.r; this.stick(); return; }
      for (const p of pebbles) {
        if (p === this || !p.settled || p.dead) continue;
        if (dist(this, p) < this.r + p.r + 2) { this.stickTo(p); return; }
      }
    } else if (this.moving) {
      this.x += this.vx; this.y += this.vy;
      if (this.x - this.r < 0 || this.x + this.r > canvas.width) this.vx *= -1;
      if (this.y - this.r <= 0) { this.y = this.r; this.stick(); return; }
      for (const p of pebbles) {
        if (p === this || !p.settled || p.dead) continue;
        if (dist(this, p) < this.r + p.r + 1) { this.stickTo(p); return; }
      }
    }
  }

  stickTo(p) {
    const ang = Math.atan2(this.y - p.y, this.x - p.x);
    this.x = p.x + Math.cos(ang) * (this.r + p.r);
    this.y = p.y + Math.sin(ang) * (this.r + p.r);
    this.stick();
  }

  stick() {
    this.moving = false; this.floating = false; this.vx = 0; this.vy = 0;
    setTimeout(() => { if (!this.dead) { rebuildConnectivity(); runMerges(); } }, 50);
  }
}

function rebuildConnectivity() {
  pebbles.forEach(p => { if (!p.moving && !p.floating) p.settled = false; });
  const queue = pebbles.filter(p => !p.dead && !p.moving && p.y - p.r <= 10);
  queue.forEach(p => p.settled = true);
  let head = 0;
  while(head < queue.length) {
    const cur = queue[head++];
    pebbles.forEach(nb => {
      if (!nb.dead && !nb.moving && !nb.settled && dist(cur, nb) < cur.r + nb.r + 5) {
        nb.settled = true; queue.push(nb);
      }
    });
  }
  pebbles.forEach(p => { if (!p.dead && !p.moving && !p.settled) p.floating = true; });
}

function runMerges() {
  let didMerge = false;
  for (let i = 0; i < pebbles.length; i++) {
    for (let j = i + 1; j < pebbles.length; j++) {
      const a = pebbles[i], b = pebbles[j];
      if (!a.dead && !b.dead && a.settled && b.settled && a.tier === b.tier && dist(a,b) < a.r + b.r + 5) {
        const nt = a.tier + 1;
        const np = new Pebble((a.x+b.x)/2, (a.y+b.y)/2, nt);
        a.dead = true; b.dead = true;
        np.moving = false; np.settled = true;
        pebbles.push(np);
        merges++; mergePointsAccumulated += (nt * 100);
        score = mergePointsAccumulated + (shots * merges);
        updateHUD(); didMerge = true;
      }
    }
  }
  if (didMerge) {
    pebbles = pebbles.filter(p => !p.dead);
    triggerFlash();
    setTimeout(() => { rebuildConnectivity(); runMerges(); }, 80);
  }
}

function launchPebble(sx, sy, ex, ey) {
  const dx = sx - ex, dy = sy - ey;
  let vx = dx * 0.18, vy = dy * 0.18;
  if (vy > -2) vy = -10;
  
  // 1. Current Pebble is fired
  const p = new Pebble(sx, LAUNCH_Y(), currentTier, vx, vy);
  pebbles.push(p);
  shots++;

  // 2. Next becomes the Current
  currentTier = nextTier;

  // 3. New Next is generated
  nextTier = Math.floor(Math.random() * 3) + 1;
  updateHUD();
}

function render(now) {
  requestAnimationFrame(render);
  ctx.fillStyle = '#08080c'; ctx.fillRect(0, 0, canvas.width, canvas.height);

  const isBusy = pebbles.some(p => p.moving || p.floating);
  hint.style.opacity = isBusy ? "1" : (isDragging ? "0" : "0.6");
  hint.textContent = isBusy ? "Wait for settle..." : "▼ Pull back to launch";

  // Danger Zone
  ctx.strokeStyle = loseTimer ? (Math.sin(now*0.015)>0 ? '#ff4757' : '#3d1010') : '#1c1c2b';
  ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(0, LOSE_Y()); ctx.lineTo(canvas.width, LOSE_Y()); ctx.stroke();

  // Launcher Center Visual
  if (!isBusy) {
    const launchP = new Pebble(dragSX || canvas.width/2, LAUNCH_Y(), currentTier);
    launchP.draw();
  }

  // Trajectory and Aim Line
  if (isDragging) {
    let tx = dragSX, ty = LAUNCH_Y(), tvx = (dragSX-dragCX)*0.18, tvy = Math.min((dragSY-dragCY)*0.18, -10);
    ctx.fillStyle = 'rgba(142, 130, 255, 0.5)';
    for(let i=0; i<12; i++) {
      tx += tvx; ty += tvy;
      ctx.beginPath(); ctx.arc(tx, ty, 4, 0, Math.PI*2); ctx.fill();
    }
    ctx.strokeStyle = 'rgba(142, 130, 255, 0.4)';
    ctx.setLineDash([5, 5]);
    ctx.beginPath(); ctx.moveTo(dragSX, LAUNCH_Y()); ctx.lineTo(dragCX, dragCY); ctx.stroke();
    ctx.setLineDash([]);
  }

  pebbles.forEach(p => { p.update(); p.draw(); });

  const isOver = pebbles.some(p => p.settled && p.y + p.r > LOSE_Y());
  if (isOver && gameActive) { 
    if (!loseTimer) loseTimer = now; 
    if (now - loseTimer > 2500) endGame(); 
  } else { loseTimer = null; }

  drawNextPanel();
}

function drawNextPanel() {
  const bx = 20, by = LAUNCH_Y() + 10, bw = 80, bh = 60;
  ctx.fillStyle = '#1c1c2b'; ctx.strokeStyle = '#3f3f5a'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 12); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#8e82ff'; ctx.font = 'bold 11px Nunito'; ctx.textAlign = 'center';
  ctx.fillText("ON DECK", bx + bw/2, by + 18);
  
  const preview = new Pebble(bx + bw/2, by + 40, nextTier);
  const scale = 18 / preview.r; 
  preview.r *= scale;
  preview.draw();
}

function updateHUD() {
  document.getElementById('score-val').textContent = Math.floor(score);
  document.getElementById('shots-val').textContent = shots;
}

function endGame() {
  gameActive = false;
  document.getElementById('final-display').textContent = "Score: " + Math.floor(score);
  document.getElementById('over-overlay').classList.add('show');
}

function startGame() {
  pebbles = []; score = 0; shots = 0; merges = 0; mergePointsAccumulated = 0;
  currentTier = Math.floor(Math.random() * 2) + 1;
  nextTier = Math.floor(Math.random() * 2) + 1;
  gameActive = true; updateHUD();
  document.querySelectorAll('.overlay').forEach(o => o.classList.remove('show'));
}

const getPos = e => {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches ? e.touches[0] : e;
  return {
    x: (touch.clientX - rect.left) * (canvas.width/rect.width),
    y: (touch.clientY - rect.top) * (canvas.height/rect.height)
  };
};

const handleDown = e => {
  if (!gameActive || pebbles.some(p => p.moving || p.floating)) return;
  const pos = getPos(e);
  if (pos.y > LOSE_Y()) { isDragging = true; dragSX = pos.x; dragSY = pos.y; dragCX = pos.x; dragCY = pos.y; }
};

const handleMove = e => { if (isDragging) { const pos = getPos(e); dragCX = pos.x; dragCY = pos.y; } };

const handleUp = () => {
  if (isDragging) {
    if (dist({x:dragSX, y:dragSY}, {x:dragCX, y:dragCY}) > 15) launchPebble(dragSX, dragSY, dragCX, dragCY);
    isDragging = false;
  }
};

canvas.addEventListener('mousedown', handleDown);
window.addEventListener('mousemove', handleMove);
window.addEventListener('mouseup', handleUp);
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleDown(e); }, {passive:false});
window.addEventListener('touchmove', e => { e.preventDefault(); handleMove(e); }, {passive:false});
window.addEventListener('touchend', handleUp);

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('retry-btn').addEventListener('click', startGame);

function dist(a,b) { return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2); }
function triggerFlash() { flash.classList.add('pop'); setTimeout(()=>flash.classList.remove('pop'), 60); }
function lightenHex(hex, amt) {
  const r = Math.min(255, parseInt(hex.slice(1,3),16)+amt), g = Math.min(255, parseInt(hex.slice(3,5),16)+amt), b = Math.min(255, parseInt(hex.slice(5,7),16)+amt);
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

requestAnimationFrame(render);
</script>
</body>
</html>
